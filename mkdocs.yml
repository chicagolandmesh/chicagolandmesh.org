site_name: Chicagoland Mesh
site_description: >-
  Join the local community of Meshtastic, MeshCore, Reticulum, and LoRa
  enthusiasts in the Chicagoland area, and collaborate in building a sustainable
  and interconnected network of decentralized nodes that have the capability of
  sending encrypted text messages, telemetry, location, and more.
site_url: https://chicagolandmesh.org

copyright: >-
  Copyright &copy; 2026 Chicagoland Mesh <u><a href="https://github.com/chicagolandmesh/chicagolandmesh.org">Contributors</a></u><br>
  <p style="margin:0">Chicagoland Mesh is not affilated with <u><a href="https://meshtastic.org" target="_blank" rel="noreferrer noopener">Meshtastic®</a></u>, nor endorsed by <u><a href="https://meshtastic.org/docs/legal/licensing-and-trademark" target="_blank" rel="noreferrer noopener">Meshtastic LLC</a></u>.</p>

nav:
  - About: about.md
  - Guides:
    - guides/index.md
    - Getting Started:
      - guides/getting-started/index.md
      - Configuring Meshtastic: guides/getting-started/configure.md
      - Mistakes to Avoid: guides/getting-started/avoid-mistakes.md
    - Setup MQTT: guides/mqtt.md
    - Local Channel: guides/local-channel.md
    - Builds:
      - guides/builds/index.md
      - Contributing: guides/builds/contributing.md
  - News: news.md
  - Map: map.md
  - MeshView:
    - meshview/index.md
    - Nodes: meshview/nodelist.md
    - Map: meshview/map.md
    - See everything: meshview/firehose.md
    - Graph: meshview/nodegraph.md
    - Stats: meshview/stats.md
    - Top Traffic: meshview/top.md
    - View Externally: https://meshview.chicagolandmesh.org
  # TODO: gallery
  # - Gallery: gallery/index.md
  - Resources: resources.md
  - Contact: contact.md

hooks:
  - mkdocs_hooks.py

plugins:
  - tags
  - search
  - privacy
  - glightbox
  - minify:
      minify_html: true
  - blog:
      blog_dir: guides/builds
      archive: false

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

theme:
  name: "material"
  custom_dir: "overrides"
  logo: "assets/images/logo-clear.svg"
  favicon: "assets/images/logo-clear.svg"
  features:
    - announce.dismiss
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.path
    - navigation.section
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.share
  icon:
    repo: "fontawesome/brands/github"
  palette:
    - media: "(prefers-color-scheme)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: chicago-light
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to auto

extra_css:
  - assets/stylesheets/extra.css

extra:
  generator: false
  social:
    - icon: custom/meshtastic
      link: https://meshtastic.org
      name: Check out the official Meshtastic site!
    - icon: "fontawesome/brands/github"
      link: https://github.com/chicagolandmesh/chicagolandmesh.org
      name: Contribute to the github!
    - icon: fontawesome/brands/discord
      link: https://chicagolandmesh.org/discord
      name: Join the discord!
